name: Deploy Landing

on:
  workflow_dispatch:
  push:
    branches: [main, prod]
    paths:
      - 'apps/landing/**'
      - 'pnpm-lock.yaml'
  pull_request:
    branches: [main, prod]
    paths:
      - 'apps/landing/**'

env:
  PNPM_VERSION: "9.0.0"
  NODE_VERSION: "22"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Create Cloudflare Pages project if not exists
        run: npx wrangler pages project create agenttrail --production-branch prod || true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build landing
        run: pnpm --filter @agenttrail/landing build

      - name: Deploy to Cloudflare Pages
        shell: bash
        run: |
          npx wrangler pages deploy apps/landing/dist \
            --project-name=agenttrail \
            --branch=${{ github.head_ref || github.ref_name }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
